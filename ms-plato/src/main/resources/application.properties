
spring.application.name=ms-platos

# Puerto donde correrá este microservicio
server.port=8086

# Configuración de base de datos H2 en memoria
spring.datasource.url=jdbc:h2:file:./data/dataPlatos/platosDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# Desactivamos la creación automática de tablas con Hibernate
# porque queremos usar migraciones con Flyway
spring.jpa.hibernate.ddl-auto=none

# Permite abrir la consola web de H2
spring.h2.console.enabled=true

# Activa Flyway para ejecutar scripts SQL al iniciar
spring.flyway.enabled=true
spring.flyway.clean-on-validation-error=true