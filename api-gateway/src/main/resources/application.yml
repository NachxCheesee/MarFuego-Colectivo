server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: locales-route
          uri: ${MS_LOCALES_URI:http://localhost:8081}
          predicates:
            - Path=/api/locales/**

        - id: producto-route
          uri: ${MS_PRODUCTO_URI:http://localhost:8082}
          predicates:
            - Path=/api/productos/**

        - id: empleados-route
          uri: ${MS_EMPLEADOS_URI:http://localhost:8083}
          predicates:
            - Path=/api/empleados/**

        - id: inventario-route
          uri: ${MS_INVENTARIO_URI:http://localhost:8084}
          predicates:
            - Path=/api/inventario/**

        - id: proveedores-route
          uri: ${MS_PROVEEDORES_URI:http://localhost:8085}
          predicates:
            - Path=/api/proveedores/**

        - id: plato-route
          uri: ${MS_PLATO_URI:http://localhost:8086}
          predicates:
            - Path=/api/platos/**

        - id: pedidos-route
          uri: ${MS_PEDIDOS_URI:http://localhost:8087}
          predicates:
            - Path=/api/pedidos/**